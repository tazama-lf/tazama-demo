apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-ui-rel-1-0-0
  namespace: development
  labels:
    app: demo-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-ui
  template:
    metadata:
      name: demo-ui-rel-1-0-0
      labels:
        app: demo-ui
      annotations:
        prometheus.io.scrape: 'false'
    spec:
      containers:
        - name: demo-ui-rel-1-0-0
          image: example.io/demo-ui-rel-1-0-0:1.0.0
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Liveness uses the cheap /api/health endpoint - no dependency I/O,
          # so a flaky NATS / admin / TMS will not trigger restart loops.
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness uses /api/ready which projects the in-memory healthState.
          # Returns 503 when NATS or the admin handshake have failed (critical),
          # 200 ("degraded") when only TMS is down (non-critical).
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources: {}
          imagePullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
        - name: frmpullsecret
      schedulerName: default-scheduler
      enableServiceLinks: false
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600